# Agentic OS — Standalone Install
# Works with Docker, Podman, or OrbStack.
#
# Quick start:
#   git clone https://github.com/bandidood/agent-os-v3
#   cd agent-os-v3
#   cp .env.example .env        # edit .env to set your API keys
#   docker compose -f docker-compose.standalone.yml up -d
#   open http://localhost:3000  # → /setup to create your first admin account
#
# Podman:
#   podman compose -f docker-compose.standalone.yml up -d
#
# Stop:
#   docker compose -f docker-compose.standalone.yml down
#
# Remove data (volumes):
#   docker compose -f docker-compose.standalone.yml down -v

services:
  agent-os:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-os-v3:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"    # http://localhost:3000
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - AGENTIC_OS_LOCATION=Local

      # ── Auth ────────────────────────────────────────────────────────────────
      # Generate once: openssl rand -base64 32
      # Then set in your .env file or here directly.
      - AUTH_SECRET=${AGENTIC_OS_AUTH_SECRET:-changeme-run-openssl-rand-base64-32}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=http://localhost:3000

      # Admin credentials — leave BOTH empty to use the /setup onboarding wizard
      # (recommended). Or pre-configure:
      #   email: AGENTIC_OS_ADMIN_EMAIL=you@example.com
      #   hash:  AGENTIC_OS_ADMIN_PASSWORD_HASH=$(docker run --rm node:22 node -e \
      #            "const c=require('crypto'),s=c.randomBytes(16).toString('hex'),h=c.scryptSync('YOUR_PASS',s,32).toString('hex');console.log(s+':'+h)")
      - AGENTIC_OS_ADMIN_EMAIL=${AGENTIC_OS_ADMIN_EMAIL:-}
      - AGENTIC_OS_ADMIN_PASSWORD_HASH=${AGENTIC_OS_ADMIN_PASSWORD_HASH:-}

      # ── API keys (set in .env) ───────────────────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ONEMINAI_API_KEY=${ONEMINAI_API_KEY:-}

      # ── Ollama (optional — connect to a running Ollama instance) ────────────
      # If you run Ollama on the host: OLLAMA_HOST=host.docker.internal
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-}

      # ── Agent CLI paths (pre-installed in the image) ─────────────────────────
      - AGENTIC_OS_CLAUDE_BIN=/root/.npm-global/bin/claude
      - AGENTIC_OS_HERMES_BIN=/usr/local/bin/hermes
      - AGENTIC_OS_ANTIGRAVITY_BIN=/root/.local/bin/agy
      - AGENTIC_OS_CODEX_BIN=/root/.npm-global/bin/codex

    volumes:
      # Config + credentials (persist /setup account across restarts)
      - agent-os-config:/root/.agentic-os
      # Claude CLI auth + sessions
      - agent-claude:/root/.claude
      # Hermes config + sessions
      - agent-hermes-config:/root/.hermes
      - agent-hermes-data:/root/.local/share/hermes
      # npm global installs (CLIs survive restarts)
      - agent-npm-prefix:/root/.npm-global
      - agent-npm-cache:/root/.npm
      # uv + local Python tools
      - agent-uv-local:/root/.local
      # Ollama models (optional — comment out if using host Ollama)
      # - agent-ollama:/root/.ollama

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/vitals"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    extra_hosts:
      # Allow the container to reach Ollama running on the host machine
      - "host.docker.internal:host-gateway"

volumes:
  agent-os-config:
  agent-claude:
  agent-hermes-config:
  agent-hermes-data:
  agent-npm-prefix:
  agent-npm-cache:
  agent-uv-local:
  # agent-ollama:
