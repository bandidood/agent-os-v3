services:
  agent-os:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-os-v3:latest
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - default
      - hermes-agent-net
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - AGENTIC_OS_LOCATION=Cloud
      # NextAuth — set AUTH_SECRET to a random 32+ char string (required)
      - AUTH_SECRET=${AGENTIC_OS_AUTH_SECRET:-}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=https://${SERVICE_FQDN_AGENT_OS:-localhost:3000}
      # Admin account — leave BOTH empty to trigger the /setup onboarding wizard
      - AGENTIC_OS_ADMIN_EMAIL=${AGENTIC_OS_ADMIN_EMAIL:-}
      - AGENTIC_OS_ADMIN_PASSWORD_HASH=${AGENTIC_OS_ADMIN_PASSWORD_HASH:-}
      # API keys — set via Coolify environment variables
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Ollama
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-}
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_PORT=11434
      # Agent CLI paths
      - AGENTIC_OS_CLAUDE_BIN=/root/.npm-global/bin/claude
      - AGENTIC_OS_HERMES_BIN=/usr/local/bin/hermes
      - AGENTIC_OS_ANTIGRAVITY_BIN=/root/.local/bin/agy
      - AGENTIC_OS_CODEX_BIN=/root/.npm-global/bin/codex
      # Hermes Agent — external container on hermes-agent-net
      - HERMES_API_URL=${HERMES_API_URL:-http://hermes-agent-lpt7eiy9zimtrmvurleqngdu:8642}
      - HERMES_API_TOKEN=${HERMES_API_TOKEN:-}
      - HERMES_DASHBOARD_URL=${HERMES_DASHBOARD_URL:-http://hermes-agent-lpt7eiy9zimtrmvurleqngdu:9119}
    volumes:
      - agent-os-v3-config:/root/.agentic-os
      - agent-claude:/root/.claude
      - agent-hermes-config:/root/.hermes
      - agent-hermes-data:/root/.local/share/hermes
      - agent-ollama:/root/.ollama
      - agent-npm-prefix:/root/.npm-global
      - agent-npm-cache:/root/.npm
      - agent-uv-local:/root/.local
      - agent-openclaw:/root/.openclaw
    labels:
      # Explicit service port so Traefik always routes to 3000
      - "traefik.http.services.agent-os-v3-svc.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/vitals"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  agent-os-v3-config:
  agent-claude:
  agent-hermes-config:
  agent-hermes-data:
  agent-ollama:
  agent-npm-prefix:
  agent-npm-cache:
  agent-uv-local:
  agent-openclaw:

networks:
  hermes-agent-net:
    name: lpt7eiy9zimtrmvurleqngdu
    external: true
